<!doctype html>
<html lang="it">
    
<head>
	<meta charset="utf-8">
	<script type="text/javascript" src="JS/scripts.js"></script>
	<link href="CSS/style.css" rel="stylesheet">
	<link rel="icon" type="image/svg+xml" href="img/logo/logo.svg">
	<title>Amministrazione</title>
	<header class="navbar">
		<div class="navContainer">
			<div class="centerPosition">
				<a href="index.jsp">
					<img class="logo" src="img/logo/logo.svg">
				</a>
				<a class="navBrand" href="index.jsp">P<span>art-</span>C</a>
			</div>

			<div class="centerPosition">
				<ul class="NavbarSub">
					<li><a class="navLink" href="Admin">Gestione Prodotti</a></li>
					<li><a class="navLink" href="profiles.html">Gestione Profili</a></li>
					<li><a class="navLink" href="delivery.html">Gestione Acquisti</a></li>
					<li><a class="navIconLink" href="Logout"><img class="navIcon" src="img/icons/userLog.png"></a></li>
				</ul>
			</div>
		</div>
	</header>
</head>

<body>

<div class="hero">
		<div class="containerTitle">
			<h1>Amministrazione</h1>
		</div>
	</div>
	<!-- End Hero Section -->
	<main>
		<div class="bg">
			<section>
				<div class="adminContainer">
					<div class="cart">						<!-- empty cart placeholder -->
						<div class="itemContainer" id="empty-cart-message">
							<div class="cart-item">
								<div class="cartRow">
									<div class="imgContainer center-item">
										<img id="pImg" class="kaioken" src="img/products/emptyProduct.png" alt="">
									<h5 >Il tuo negozio ha solo te!</h5>
									</div>
									<div class="dataContainer center-item">
										<h5>Non ci sono utenti iscritti!</h5>
									</div>
								</div>
							</div>
						</div>


						<div class="itemContainer">
							<div class="cart-item">
								<div class="cartRow">
									<h5 class="itemName">EMAIL</h5>
									<h5 class="itemName">PWD</h5>
									<h5 class="itemName">NOME</h5>
									<h5 class="itemName">COGNOME</h5>
									<h5>
										<span id="price">ADMIN?</span>
									</h5>
									<div class="last">
										<div class="dataContainer center-item">

                                            <a class="modifyBtn" href="#">
												<img src="img/icons/pencil.png" alt="" class="removeItem">
											</a>
											<a class="modifyBtn" href="CartServlet?id=<%=b.getCode()%>&action=remove&quantity=<%=b.getQuantity()%>">
												<img src="img/icons/iconTrash.png" alt="" class="removeItem">
											</a>
										</div>
									</div>
								</div>
							</div>
						</div>
			</section>
		</div>
	</main>




</body>



</html>
